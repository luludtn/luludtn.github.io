<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas Dantan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Helvetica+Neue:wght@300;400;700&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
img { display: block; width: 100%; height: auto; }
a { text-decoration: none; color: inherit; }

:root {
  --bg:        #ffffff;
  --fg:        #0a0a0a;
  --muted:     #aaa;
  --border:    #e8e8e8;
  --sidebar-w: 240px;
  --gap:       10px;
  --font-sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
[data-theme="dark"] {
  --bg:     #0f0f0f;
  --fg:     #f0ede8;
  --muted:  #555;
  --border: #1e1e1e;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  transition: background 0.3s, color 0.3s;
}

/* ── SIDEBAR ── */
#sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 2rem;
  z-index: 200;
  background: var(--bg);
  transition: background 0.3s, border-color 0.3s;
}
.sidebar-logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  line-height: 1.4;
  cursor: pointer;
  display: block;
  margin-bottom: 3rem;
}
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.sidebar-nav span {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s;
  padding: 4px 0;
  display: block;
}
.sidebar-nav span:hover { color: var(--fg); }
.sidebar-nav span.active {
  color: var(--fg);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.sidebar-bottom {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.skin-icon {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--fg);
  border: 1px solid var(--border);
  flex-shrink: 0;
  transition: background 0.3s, border-color 0.3s;
}
.skin-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  transition: color 0.2s;
}
.sidebar-bottom:hover .skin-label { color: var(--fg); }

/* ── MAIN ── */
#main { margin-left: var(--sidebar-w); min-height: 100vh; }
.view { display: none; }
.view.active { display: block; }

/* ════════════════════════════════
   LANDING PAGE — single series
   Title + description at top
   then masonry grid
════════════════════════════════ */
#view-portfolio { min-height: 100vh; }

.landing-header {
  padding: 2.5rem var(--gap) 2rem;
}
.landing-title-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  align-items: start;
  padding: 0 var(--gap);
}
.landing-title {
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  font-weight: 700;
  line-height: 0.95;
  letter-spacing: -0.03em;
}
.landing-desc {
  font-size: 14px;
  line-height: 1.75;
  color: var(--muted);
  font-weight: 300;
  padding-top: 0.4rem;
}

/* 3-col masonry — full photos, no crop */
.landing-masonry {
  columns: 3;
  column-gap: var(--gap);
  padding: 2rem var(--gap) 6rem;
}
.landing-photo-item {
  break-inside: avoid;
  margin-bottom: var(--gap);
  overflow: hidden;
  cursor: pointer;
  display: block;
}
.landing-photo-item img {
  width: 100%;
  height: auto;
  display: block;
  transition: opacity 0.3s;
}
.landing-photo-item:hover img { opacity: 0.85; }

.no-photos {
  padding: 4rem var(--gap);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

/* ════════════════════════════════
   FULLSCREEN LIGHTBOX
════════════════════════════════ */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }
#lb-img {
  max-width: 90vw;
  max-height: 90vh;
  width: auto;
  height: auto;
  display: block;
  object-fit: contain;
}
.lb-close {
  position: fixed;
  top: 1.5rem; right: 2rem;
  color: rgba(255,255,255,0.4);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-sans);
  transition: color 0.2s;
}
.lb-close:hover { color: #fff; }
.lb-arrow {
  position: fixed;
  top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  letter-spacing: 0.15em;
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-sans);
  padding: 2rem;
  transition: color 0.2s;
}
.lb-arrow:hover { color: #fff; }
.lb-prev { left: 0; }
.lb-next { right: 0; }
.lb-counter {
  position: fixed;
  bottom: 1.5rem; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.3);
  font-size: 10px;
  letter-spacing: 0.15em;
}

/* ════════════════════════════════
   ABOUT
════════════════════════════════ */
#view-about { padding: 3rem; }
.about-back {
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font-sans);
  padding: 0 0 3rem;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.about-back::before { content: '←'; }
.about-back:hover { color: var(--fg); }
.about-inner { max-width: 580px; }
.about-name {
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700;
  line-height: 1.05;
  margin-bottom: 2.5rem;
  letter-spacing: -0.02em;
}
.about-bio { color: var(--muted); font-size: 15px; line-height: 1.85; margin-bottom: 1.25rem; }
.about-bio strong { color: var(--fg); font-weight: 400; }
.about-links { margin-top: 3rem; }
.about-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.9rem 0;
  border-top: 1px solid var(--border);
  font-size: 12px;
  letter-spacing: 0.05em;
}
.about-row:last-child { border-bottom: 1px solid var(--border); }
.about-row span { color: var(--muted); }
.about-row a { transition: opacity 0.2s; }
.about-row a:hover { opacity: 0.45; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  .landing-masonry { columns: 2; }
  .landing-title-row { grid-template-columns: 1fr; gap: 1rem; }
}
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  #sidebar {
    width: 100%; height: 52px;
    flex-direction: row; align-items: center;
    padding: 0 1rem;
    border-right: none; border-bottom: 1px solid var(--border);
    bottom: auto;
  }
  .sidebar-logo { margin-bottom: 0; font-size: 11px; }
  .sidebar-nav { flex-direction: row; gap: 1.2rem; }
  .sidebar-nav span { font-size: 11px; }
  .skin-label { display: none; }
  .skin-icon { width: 24px; height: 24px; }
  #main { margin-left: 0; padding-top: 52px; }
  .landing-masonry { columns: 1; }
  #view-about { padding: 1.5rem; }
}

</style>
</head>
<body>

<aside id="sidebar">
  <div>
    <span class="sidebar-logo" onclick="showView('portfolio')">Lucas Dantan<br>Photography</span>
    <nav class="sidebar-nav">
      <span onclick="showView('portfolio')" id="nav-portfolio" class="active">Portfolio</span>
      <span onclick="showView('about')"     id="nav-about">Infos</span>
    </nav>
  </div>
  <div class="sidebar-bottom" onclick="toggleTheme()">
    <div class="skin-icon"></div>
    <span class="skin-label">Change skin</span>
  </div>
</aside>

<div id="main">

  <!-- LANDING — single series -->
  <div class="view active" id="view-portfolio">
    <div class="landing-header">
      <div class="landing-title-row">
        <h1 class="landing-title" id="landing-title"></h1>
        <p class="landing-desc" id="landing-desc"></p>
      </div>
    </div>
    <div class="landing-masonry" id="landing-photos"></div>
  </div>

  <!-- ABOUT -->
  <div class="view" id="view-about">
    <button class="about-back" onclick="showView('portfolio')">Back</button>
    <div class="about-inner">
      <h1 class="about-name">Lucas Dantan</h1>
      <p class="about-bio">Write a short bio here — who you are, where you're based, and what drives your work.</p>
      <p class="about-bio"><strong>Your photography style or approach.</strong> Available for commissions and editorial work.</p>
      <div class="about-links">
        <div class="about-row"><span>Instagram</span><a href="https://instagram.com/yourhandle" target="_blank">@yourhandle</a></div>
        <div class="about-row"><span>Email</span><a href="mailto:you@email.com">you@email.com</a></div>
        <div class="about-row"><span>Based in</span><span>Your City</span></div>
      </div>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">Close ✕</button>
  <button class="lb-arrow lb-prev" onclick="lbMove(-1)">← Prev</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-arrow lb-next" onclick="lbMove(1)">Next →</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>

// ═══════════════════════════════════════════════════════
//  YOUR SERIES — 1 series, 75 photos
//  Replace each null with your Cloudinary URL like:
//  "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v.../photo.jpg"
// ═══════════════════════════════════════════════════════

const SERIES = {
  title: "Un bout d'été en Tunisie 🐚",
  description: "Tunisia has been making me so curious over the last few years, mainly driven by the people surrounding me. I've always heard about it, got told a million stories from there, could imagine it in some shapes into my head. But it's always been a very fictional to me, until the opportunity came. I started photography recently, and fell in love with black and white. One could find it wrong to go to such a colorful place and remove colors. I love it and will love it forever. Now, please discover what I've discovered, look at these faces, these scenes, these moments with these characters. — Un bout d'été en Tunise, Juillet 2025",
  photos: [
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498276/IMG_2738_m0q4vc.jpg",
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498274/IMG_2739_xh4pa5.jpg",
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498273/IMG_2743_pilcgr.jpg",
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498269/IMG_2761_otdgf7.jpg",
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498263/IMG_2792_gdnpuo.jpg",
    "https://res.cloudinary.com/dzhvoacrg/image/upload/q_auto,f_auto/v1773498259/IMG_2812_pwyvof.jpg",
    // ↓ Add your remaining 69 photos below, one URL per line
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null, null, null, null, null,
    null
  ]
};

// ═══════════════════════════════════════════════════════

let currentLbIndex = 0;
// Only real photos (non-null) shown
const realPhotos = SERIES.photos.filter(p => p !== null);

function buildPage() {
  document.getElementById('landing-title').textContent = SERIES.title;
  document.getElementById('landing-desc').textContent = SERIES.description;

  const grid = document.getElementById('landing-photos');
  if (!realPhotos.length) {
    grid.innerHTML = `<p class="no-photos">No photos added yet — replace the nulls with your Cloudinary URLs</p>`;
    return;
  }
  grid.innerHTML = realPhotos.map((url, idx) => `
    <div class="landing-photo-item" onclick="openLightbox(${idx})">
      <img src="${url}" alt="" loading="lazy">
    </div>`
  ).join('');
}

function openLightbox(index) {
  currentLbIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function updateLightbox() {
  document.getElementById('lb-img').src = realPhotos[currentLbIndex];
  document.getElementById('lb-counter').textContent =
    (currentLbIndex + 1) + ' / ' + realPhotos.length;
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function lbMove(dir) {
  currentLbIndex = (currentLbIndex + dir + realPhotos.length) % realPhotos.length;
  updateLightbox();
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowRight') lbMove(1);
  if (e.key === 'ArrowLeft')  lbMove(-1);
  if (e.key === 'Escape')     closeLightbox();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') closeLightbox();
});

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0, 0);
  document.querySelectorAll('.sidebar-nav span').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-' + name);
  if (el) el.classList.add('active');
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
}

buildPage();
</script>
</body>
</html>
